<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tutto Italiano</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Cormorant+Garamond:wght@700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
scroll-behavior:smooth;
}

body{
font-family:Poppins,sans-serif;
background:#f7f3eb;
color:#222;
}

header{

height:95vh;

background:linear-gradient(rgba(0,0,0,.45),rgba(0,0,0,.45)),
url("https://images.unsplash.com/photo-1513104890138-7c749659a591?q=80&w=1600&auto=format&fit=crop");

background-size:cover;

background-position:center;

display:flex;

justify-content:center;

align-items:center;

text-align:center;

color:white;

padding:30px;

}

.hero{

max-width:700px;

}

.logo{

font-size:60px;

font-family:'Cormorant Garamond',serif;

letter-spacing:3px;

}

.hero h2{

font-size:24px;

font-weight:300;

margin-top:15px;

}

.hero p{

margin:25px 0;

font-size:18px;

opacity:.9;

}

.btn{

display:inline-block;

padding:16px 40px;

background:#b38b4d;

border-radius:50px;

color:white;

font-weight:600;

text-decoration:none;

transition:.3s;

}

.btn:hover{

transform:translateY(-3px);

}

nav{

position:sticky;

top:0;

background:white;

padding:15px;

display:flex;

gap:10px;

overflow:auto;

box-shadow:0 5px 20px rgba(0,0,0,.08);

z-index:1000;

}

nav a{

text-decoration:none;

padding:10px 18px;

border-radius:30px;

background:#1d4b37;

color:white;

white-space:nowrap;

font-size:14px;

}

section{

padding:60px 7%;

}

.title{

font-size:40px;

font-family:'Cormorant Garamond',serif;

margin-bottom:30px;

color:#1d4b37;

}

.grid{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(320px,1fr));

gap:25px;

}

.card{

background:white;

border-radius:18px;

overflow:hidden;

box-shadow:0 12px 35px rgba(0,0,0,.08);

transition:.3s;

}

.card:hover{

transform:translateY(-6px);

}

.card img{

width:100%;

height:220px;

object-fit:cover;

}

.info{

padding:22px;

}

.info h3{

font-size:26px;

font-family:'Cormorant Garamond',serif;

margin-bottom:12px;

}

.desc{

line-height:1.7;

color:#666;

font-size:15px;

}

.price{

margin-top:18px;

font-size:28px;

color:#1d4b37;

font-weight:bold;

}

footer{

background:#1d4b37;

color:white;

padding:50px;

text-align:center;

line-height:2;

margin-top:80px;

}

</style>

</head>

<body>

<header>

<div class="hero">

<div class="logo">TUTTO ITALIANO</div>

<h2>Benvenuti</h2>

<p>%100 Ekşi Mayalı İtalyan Mutfağı</p>

<a class="btn" href="#pizza">Menüyü Gör</a>

</div>

</header>

<nav>

</nav>
